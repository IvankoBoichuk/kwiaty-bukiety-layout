<svg viewBox="0 0 1200 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Universal SVG Placeholder - adapts to any size -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bgGradient)"/>
  
  <!-- Decorative elements -->
  <circle cx="150" cy="150" r="100" fill="#ffffff" opacity="0.08"/>
  <circle cx="1050" cy="650" r="150" fill="#ffffff" opacity="0.08"/>
  <circle cx="950" cy="200" r="80" fill="#ffffff" opacity="0.06"/>
  <rect x="100" y="600" width="200" height="200" rx="20" fill="#ffffff" opacity="0.05" transform="rotate(-15 200 700)"/>
  <rect x="900" y="50" width="150" height="150" rx="15" fill="#ffffff" opacity="0.05" transform="rotate(20 975 125)"/>
  
  <!-- Main icon - image symbol -->
  <g transform="translate(450, 250)" filter="url(#glow)">
    <!-- Mountain/landscape icon -->
    <rect x="0" y="0" width="300" height="300" rx="20" fill="#ffffff" opacity="0.15"/>
    
    <!-- Sun -->
    <circle cx="220" cy="80" r="35" fill="#ffffff" opacity="0.9"/>
    
    <!-- Mountains -->
    <path d="M0 220 L100 100 L180 180 L300 220 L300 300 L0 300 Z" fill="#ffffff" opacity="0.7"/>
    <path d="M50 240 L150 140 L250 240 L300 240 L300 300 L0 300 Z" fill="#ffffff" opacity="0.5"/>
    
    <!-- Image frame corners -->
    <path d="M20 20 L20 60 M20 20 L60 20" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
    <path d="M280 20 L280 60 M280 20 L240 20" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
    <path d="M20 280 L20 240 M20 280 L60 280" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
    <path d="M280 280 L280 240 M280 280 L240 280" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
  </g>
  
  <!-- Text -->
  <text x="600" y="630" font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-size="38" font-weight="700" fill="#ffffff" text-anchor="middle" opacity="0.95">
    Image Placeholder
  </text>
  <text x="600" y="675" font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-size="20" font-weight="400" fill="#ffffff" text-anchor="middle" opacity="0.75">
    Replace with your image • Responsive SVG
  </text>
  
  <!-- Size indicator -->
  <text x="600" y="710" font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-size="16" font-weight="300" fill="#ffffff" text-anchor="middle" opacity="0.6">
    Adapts to any container size
  </text>
</svg>
